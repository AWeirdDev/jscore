name: Build
run-name: "Build (triggered by @${{ github.actor }})"

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: Build on macOS
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        BUILD_TARGET: [release]
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v5

      - name: Build binaries for "${{ matrix.BUILD_TARGET }}"
        run: cargo build --profile ${{ matrix.BUILD_TARGET }}

      - name: Run tests for "${{ matrix.BUILD_TARGET }}"
        run: cargo test --profile ${{ matrix.BUILD_TARGET }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: jscore-macos-${{ matrix.platform.target }}-${{ matrix.BUILD_TARGET }}
          path: |
            target/${{ matrix.BUILD_TARGET }}/libjscore.d
            target/${{ matrix.BUILD_TARGET }}/libjscore.dylib

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
          - runner: windows-11-arm
            target: aarch64

    steps:
      - uses: actions/checkout@v5

      - name: Build binaries for "${{ matrix.BUILD_TARGET }}"
        run: cargo build --profile ${{ matrix.BUILD_TARGET }}

      - name: Run tests for "${{ matrix.BUILD_TARGET }}"
        run: cargo test --profile ${{ matrix.BUILD_TARGET }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: jscore-windows-${{ matrix.platform.target }}-${{ matrix.BUILD_TARGET }}
          path: |
            target/${{ matrix.BUILD_TARGET }}/libjscore.dll

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        BUILD_TARGET: [release]
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v5

      - name: Build binaries for "${{ matrix.BUILD_TARGET }}"
        run: cargo build --profile ${{ matrix.BUILD_TARGET }}

      - name: Run tests for "${{ matrix.BUILD_TARGET }}"
        run: cargo test --profile ${{ matrix.BUILD_TARGET }}

      - name: Get ICU
        run: |
          sudo apt-get install -y libicu-dev

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: jscore-linux-${{ matrix.platform.target }}-${{ matrix.BUILD_TARGET }}
          path: |
            target/${{ matrix.BUILD_TARGET }}/jscore.a
            target/${{ matrix.BUILD_TARGET }}/libjscore.so
